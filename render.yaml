services:
  - type: web
    name: khaos-store
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn khaos_store.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: khaos-store-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        value: dxbsu1sud
      - key: CLOUDINARY_API_KEY
        value: 673698288254848
      - key: CLOUDINARY_API_SECRET
        value: wC0DfLplnYAIBEqrpe9maNE3i2Q
      - key: EMAIL_HOST
        value: smtp-relay.brevo.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: a5e3fc001@smtp-brevo.com
      - key: EMAIL_HOST_PASSWORD
        value: fdfbd5fa1b8f2bbb1ed97185a1c037
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"

databases:
  - name: khaos-store-db
    databaseName: khaos_store
    user: khaos_user
    plan: free